name: starbuck_app
description: A modern Starbucks coffee ordering demo app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.2

  # Animations
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  lottie: ^3.1.0

  # Images
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # Fonts
  google_fonts: ^6.2.1

  # UI Utilities
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0

  # Maps
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo/
    - assets/images/drinks/
    - assets/images/onboarding/
    - assets/images/profile/
    - assets/animations/
